<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AELO 57th Anniversary Dinner Countdown</title>
    <style>
        /* Reset and Mobile Optimization */
        * {
            box-sizing: border-box;
        }
        
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #05080c;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 9:16 Aspect Ratio Poster Framework */
        .poster-container {
            width: 100vw;
            height: 100vh;
            max-width: 56.25vh; /* Perfect 9:16 constraints */
            max-height: 177.78vw; 
            position: relative;
            
            /* Reference Background Image Setup */
            background-image: url('Countdown Template.png'); /* Name your template image 'Countdown Template.png' */
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.7);
        }

        /* The Dynamic Overlay Layer inside the Upper Box Frame */
        .counter-overlay-box {
            position: absolute;
            /* Positions the content precisely over the black frame of Countdown Template.jpg */
            top: 10.5%; 
            left: 7.5%;
            width: 85%;
            height: 23%;
            
            /* Layout styling for the inner text placement */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            pointer-events: none; /* Allows natural interaction layers underneath */
        }

        /* Giant Dynamic Countdown Number styling */
        .dynamic-number {
            font-size: 5.5rem;
            font-weight: 900;
            line-height: 0.9;
            margin: 0;
            background: linear-gradient(180deg, #ffffff 40%, #b0c4de 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 12px rgba(0, 242, 254, 0.5));
        }

        /* Description State Label text styling */
        .dynamic-label {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 5px;
            color: #00f2fe;
            margin-top: 10px;
            text-transform: uppercase;
            text-shadow: 0 0 8px rgba(0, 242, 254, 0.6);
        }
    </style>
</head>
<body>

    <!-- 9:16 Poster Container mapping to Countdown Template.jpg -->
    <div class="poster-container">
        
        <!-- Interactive Text Engine Layer mapped precisely over the empty frame box -->
        <div class="counter-overlay-box">
            <h1 class="dynamic-number" id="days-count">--</h1>
            <p class="dynamic-label" id="days-label">Days To Go</p>
        </div>

    </div>

    <script>
        // Set target date strictly to July 8, 2026 (Month index is 0-11: July = 6)
        const EVENT_TARGET_DATE = new Date(2026, 6, 8, 18, 30, 0); 

        function runSystemCountdownEngine() {
            const systemCurrentTime = new Date();
            const timeDelta = EVENT_TARGET_DATE - systemCurrentTime;

            // Convert milliseconds into remaining whole days
            const totalDaysRemaining = Math.ceil(timeDelta / (1000 * 60 * 60 * 24));
            
            const numberDOM = document.getElementById('days-count');
            const labelDOM = document.getElementById('days-label');

            // Evaluation Loop mapping grammar states dynamically
            if (totalDaysRemaining > 1) {
                numberDOM.innerText = totalDaysRemaining;
                labelDOM.innerText = "Days To Go";
            } else if (totalDaysRemaining === 1) {
                numberDOM.innerText = "01";
                labelDOM.innerText = "Day To Go";
            } else if (totalDaysRemaining === 0) {
                numberDOM.innerText = "🎉";
                labelDOM.innerText = "It's Dinner Day!";
            } else {
                numberDOM.innerText = "00";
                labelDOM.innerText = "Event Concluded";
            }
        }

        // Run immediately when system DOM finishes painting context elements
        window.onload = runSystemCountdownEngine;
    </script>
</body>
</html>
